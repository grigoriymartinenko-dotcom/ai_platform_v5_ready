version: '3.8'

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  llm_service:
    build: ./services/llm_service
    container_name: llm_service
    ports:
      - "8100:8100"
    depends_on:
      - redis

  agent_service:
    build: ./services/agent_service
    container_name: agent_service
    ports:
      - "8500:8500"
    depends_on:
      - llm_service
      - redis

  gateway_service:
    build: ./services/gateway_service
    container_name: gateway_service
    ports:
      - "8000:8000"
    depends_on:
      - agent_service